services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: familhas-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle}
      ORACLE_DATABASE: ${ORACLE_DATABASE:-FAMILHASPDB}
      APP_USER: ${ORACLE_APP_USER:-familhas}
      APP_USER_PASSWORD: ${ORACLE_APP_USER_PASSWORD:-familhas123}
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle/init:/container-entrypoint-initdb.d
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: familhas-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s
  keycloak:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    image: familhas-keycloak:26.4.0-oracle
    container_name: familhas-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: oracle
      KC_DB_URL: ${KEYCLOAK_DB_URL:-jdbc:oracle:thin:@//oracle:1521/FAMILHASPDB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-KEYCLOAK}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
      KC_DB_SCHEMA: ${KEYCLOAK_DB_SCHEMA:-KEYCLOAK}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_ENABLED: "true"
      KC_HTTPS_KEY_STORE_FILE: ${KEYCLOAK_HTTPS_KEY_STORE_FILE:-/opt/keycloak/keystore/keystore.p12}
      KC_HTTPS_KEY_STORE_PASSWORD: ${KEYCLOAK_HTTPS_KEY_STORE_PASSWORD:-changeit}
      KC_HTTPS_KEY_STORE_TYPE: ${KEYCLOAK_HTTPS_KEY_STORE_TYPE:-PKCS12}
      KC_CORS: "true"
      KC_CORS_ALLOWED_ORIGINS: ${KEYCLOAK_CORS_ALLOWED_ORIGINS:-https://localhost:4200}
      KC_CORS_ALLOW_CREDENTIALS: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    depends_on:
      oracle:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./keycloak/data/import:/opt/keycloak/data/import
      - ./keycloak/keystore:/opt/keycloak/keystore
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8443"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: familhas-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

volumes:
  oracle_data:
